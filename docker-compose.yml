version: "3.9"

volumes:
  jenkins_home:

networks:
  shipstack-net:
    driver: bridge
  jenkins-net:
    driver: bridge

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: shipstack-backend
    restart: unless-stopped
    networks:
      - shipstack-net
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev_webhook_secret}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5000:5000"
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
        - NEXT_PUBLIC_WS_URL=ws://localhost:5001
        - NEXT_PUBLIC_APP_NAME=ShipStack
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
    container_name: shipstack-frontend
    restart: unless-stopped
    networks:
      - shipstack-net
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: ws://localhost:5001
      NEXT_PUBLIC_APP_NAME: ShipStack
    ports:
      - "3000:3000"

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: shipstack-jenkins
    restart: unless-stopped
    networks:
      - shipstack-net
      - jenkins-net
    environment:
      JENKINS_OPTS: --httpPort=8080
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9090:8080"
      - "50000:50000"
    user: root
