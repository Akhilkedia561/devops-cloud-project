version: "3.9"

volumes:
  postgres_data:
  redis_data:
  jenkins_home:
  # Named volumes for node_modules — isolated per service,
  # never mixed with host files, never need wiping manually
  frontend_node_modules:
  frontend_next:
  backend_node_modules:

networks:
  shipstack-net:
    driver: bridge
  jenkins-net:
    driver: bridge

services:

  postgres:
    image: postgres:16-alpine
    container_name: shipstack-postgres
    restart: unless-stopped
    networks:
      - shipstack-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shipstack}
      POSTGRES_USER: ${POSTGRES_USER:-shipstack_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipstack_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shipstack_user} -d ${POSTGRES_DB:-shipstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: shipstack-redis
    restart: unless-stopped
    networks:
      - shipstack-net
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: shipstack-backend
    restart: unless-stopped
    networks:
      - shipstack-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-shipstack_user}:${POSTGRES_PASSWORD:-shipstack_secret}@postgres:5432/${POSTGRES_DB:-shipstack}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      FRONTEND_URL: http://localhost:3000
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev_webhook_secret}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
    volumes:
      # Mount full backend folder for hot reload
      - ./backend:/app
      # Named volume keeps container node_modules isolated from host
      - backend_node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8001
        - NEXT_PUBLIC_APP_NAME=ShipStack
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
    container_name: shipstack-frontend
    restart: unless-stopped
    networks:
      - shipstack-net
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
      NEXT_PUBLIC_APP_NAME: ShipStack
    volumes:
      # Mount full frontend folder for hot reload
      - ./frontend:/app
      # Named volumes keep Linux binaries isolated from host files.
      # Using NAMED volumes (not anonymous) means they persist across
      # `docker compose down` but are NOT reset by `down -v` unless
      # you explicitly remove them. This is intentional — the binaries
      # inside are correct and we don't want to rebuild them every time.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: shipstack-jenkins
    restart: unless-stopped
    networks:
      - shipstack-net
      - jenkins-net
    environment:
      JENKINS_OPTS: --httpPort=8080
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9090:8080"
      - "50000:50000"
    user: root
